<html>
  <head>

    <script>
      stlite.mount({
        // install python packages in browser
        requirements: ["onnxruntime-web", "pillow", "numpy"],
        entrypoint: "app.py",
        files: {
          "app.py": `

from PIL import Image

st.title("🍊 Citrus Greening Diagnostic (Offline)")
st.write("Hardware-Agnostic Leaf Classifier")

uploaded_file = st.file_uploader("Take/Upload a Leaf Photo", type=["jpg", "png"])

if uploaded_file:
    img = Image.open(uploaded_file)
    st.image(img, caption="Leaf Image", use_column_width=True)
    
    seg_session = ort.InferenceSession("leaf_segmentor.onnx")
cls_session = ort.InferenceSession("leaf_classifier.onnx")

# img = Image.open("healthy-citrus-leaves-jpg-noelle-johnson-landscape-consulting-img~4b71c74301143308_14-0176-1-e5fed3a.jpg").convert("RGB")
transform = transforms.Compose([
    transforms.Resize((224, 224)),
    transforms.ToTensor(),
    transforms.Normalize(mean=[0.485, 0.456, 0.406], std=[0.229, 0.224, 0.225]),
])
# CONNX runs on fast numpy matrices
# input_data = transform(img).unsqueeze(0).numpy()
test_img = test_set[7]
input_data = test_img[0].unsqueeze(0).numpy()
target_mask = test_img[2].unsqueeze(0).numpy()

seg_inputs = {'image_input': input_data}
backbone, global_mask = seg_session.run(None, seg_inputs)

if uploaded_file is not None:
    img = Image.open(uploaded_file)
    st.image(img, caption="Uploaded Leaf", width=True)
    
    if st.button("Analyze Leaf"):
        
        cls_inputs = {
            'backbone_input': backbone,
            'mask_input': global_mask
        }
        logits = cls_session.run(None, cls_inputs)[0]

        # raw softmax
        exp_logits = np.exp(logits - np.max(logits))
        probs = exp_logits / exp_logits.sum()

        confidence = np.max(probs, axis=1)
        pred = np.argmax(probs, axis=1)[0]
        confidence = confidence[0] * 100
        argmap = {0: "healthy", 1: "HLB"}
        disease_status = argmap[pred.item()]

        fairness = score(to_fairvec(transform(img)), ref)
        # fairness = score(to_fairvec(test_img[0]), ref)
        
        st.subheader("Diagnostic Results:")
        st.write(f"**Prediction:** {disease_status}")
        st.write(f"**Confidence:** {confidence:.2f}%")
        # st.write(f"Image reliability relative to training set: {(fairness):.2f}%")
        st.metric(label="Image Reliability (Fairness Score)", value=f"{(fairness):.2f}%")

`
